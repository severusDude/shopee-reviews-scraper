  "max_requests_per_run": 150,
  "timeout_s": 30,
  "stop_on_status": [
    403,
    429
  ],
  "stop_on_keywords": [
    "captcha",
    "verify you are human",
    "login",
    "sign in",
    "forbidden",
    "access denied"
  ],
  "user_agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36",
  "public_only": true,
  "single_thread_only": true
}
