{
  "categories": [
    "Elektronik",
    "Fashion",
    "Kesehatan",
    "Kecantikan",
    "Rumah Tangga",
    "Olahraga"
  ],
  "target_products_per_category": 9,
  "max_reviews_per_product": 100,
  "min_delay_s": 4,
  "max_delay_s": 9,
  "cooldown_every_n_requests": 10,
  "cooldown_min_s": 60,
